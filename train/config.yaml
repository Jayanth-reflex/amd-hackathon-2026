# Synthetic-data caveat: thin-corpus domains use a non-abliterated teacher
synthetic:
  teacher_model: "deepseek-ai/DeepSeek-V3"      # low-refusal teacher, large context
  generate_format: "chatml"
  max_tokens_per_qa: 1024
  ratio_to_raw: 0.5                             # 1 synthetic row per 2 raw rows
  applies_to:
    - indian_taxation
    - quantitative_finance
    - engineering
    - psychology.cia_declassified
    - psychology.mossad_israeli_oc_open
    - defense_forces.india_armed_forces

# License hygiene
license_filter:
  allow:
    - cc-by
    - cc-by-sa
    - cc0
    - public_domain
    - mit
    - apache-2.0
  deny:
    - cc-by-nc          # incompatible with our Apache-2.0 weights downstream
    - proprietary
    - unknown
