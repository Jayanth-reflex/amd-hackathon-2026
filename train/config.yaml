# Training config for amd-hackathon-2026
# Revision 5.2 — Option B-prime (4K seq_len, 80M tokens, flash-attn-2)
# Profile result on MI300X 192GB at 8K OOM'd; 4K fits at 169GB peak / 28.3s/step.
# 80M tokens × 28.3s/step ÷ 65,536 tokens/step = 19.2h projected training time.
# Locked dataset blend per Jayanth's 2026-04-26 turn.

base_model: unsloth/Qwen3.6-35B-A3B
fallback_models:
  - unsloth/Qwen3.5-35B-A3B   # tier-2 if Qwen3.6 fails H+2 smoke
  - unsloth/Qwen3-30B-A3B     # tier-3, more battle-tested

output:
  hf_repo: Reflex-jr/Qwen3.6-35B-A3B-Domain
  aggressive_repo: Reflex-jr/Qwen3.6-35B-A3B-Domain-Aggressive
  gguf_repo: Reflex-jr/Qwen3.6-35B-A3B-Domain-Aggressive-GGUF
  local_dir: /workspace/out/lora_adapter
  base_local: /data/hf/Qwen3.6-35B-A3B   # already downloaded on droplet

# Loader (Unsloth FastVisionModel — Qwen3.6 is multimodal)
loader:
  max_seq_length: 4096          # OOM at 8K w/o flash-linear-attention; 4K fits at 169GB peak
  load_in_4bit: false
  load_in_16bit: true
  full_finetuning: false
  attn_implementation: flash_attention_2
  use_cache_during_train: false

# LoRA
lora:
  r: 16
  alpha: 16
  dropout: 0.0
  bias: none
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  use_gradient_checkpointing: unsloth
  random_state: 3407
  freeze_vision_encoder: true
  freeze_moe_router: true

# Training (49M tokens combined, ~6h/epoch — 2 epochs = ~12h)
training:
  num_train_epochs: 2               # 2 passes since 49M < 80M target
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8    # effective batch = 8
  learning_rate: 5.0e-5
  lr_scheduler_type: cosine
  warmup_steps: 50
  optim: adamw_8bit
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 10
  save_steps: 500
  save_total_limit: 3
  bf16: true
  fp16: false
  dataloader_num_workers: 0
  dataset_num_proc: 1
  group_by_length: true
  report_to: [wandb, tensorboard]
  run_name: qwen36-domain-aggressive-rev5.1
  seed: 3407

# W&B (verified entity via API: jayanth-jr)
wandb:
  project: amd-hackathon-2026
  entity: jayanth-jr
  tags: [mi300x, qwen3.6, lora, bf16, hackathon-2026, rev5.1]

# Mid-eval callback (25/50/75/100% checkpoints)
mid_eval:
  enabled: true
  checkpoint_fractions: [0.25, 0.50, 0.75, 1.00]
  held_out_path: /workspace/eval/domain_qa.jsonl
  max_new_tokens: 256
  per_domain_n: 30

# Loss-spike kill-switch
loss_spike:
  rolling_mean_window: 50
  comparison_window: 200
  ratio_threshold: 1.3
  action: pause_dump_revert

# Smoke gate (H+2)
smoke:
  steps: 100
  rows: 1000
  expect_loss_decrease: true
  max_memory_gb: 90

# ============================================================================
# Dataset blend — Revision 5.1 (locked 2026-04-26)
# Total: 80,000,000 tokens
# Macro: General 55% / Reasoning 7% / Tools 6% / Domain 32%
# ============================================================================
blend:
  total_tokens: 80_000_000

  # ---------- A. GENERAL INSTRUCT — 55% = 44.0M tokens ----------
  general:
    share: 0.55
    sources:
      - {id: "teknium/OpenHermes-2.5",                            type: hf, share: 0.10150, split: train}
      - {id: "allenai/tulu-3-sft-mixture",                        type: hf, share: 0.08460, split: train}
      - {id: "HuggingFaceH4/ultrachat_200k",                      type: hf, share: 0.06770, split: train_sft}
      - {id: "cognitivecomputations/dolphin-r1",                  type: hf, share: 0.05080, split: reasoning-deepseek}
      - {id: "allenai/WildChat-1M",                               type: hf, share: 0.05080, split: train}
      - {id: "OpenAssistant/oasst2",                              type: hf, share: 0.04230, split: train}
      - {id: "Open-Orca/SlimOrca",                                type: hf, share: 0.04230, split: train}
      - {id: "LDJnr/Capybara",                                    type: hf, share: 0.03380, split: train}
      - {id: "m-a-p/CodeFeedback-Filtered-Instruction",           type: hf, share: 0.02540, split: train}
      - {id: "cognitivecomputations/SystemChat-2.0",              type: hf, share: 0.01690, split: train}
      - {id: "Magpie-Align/Magpie-Llama-3.1-Pro-300K-Filtered",   type: hf, share: 0.01690, split: train}
      - {id: "jondurbin/airoboros-3.2",                           type: hf, share: 0.01690, split: train}

  # ---------- B. REASONING / MATH — 7% = 5.6M tokens ----------
  reasoning:
    share: 0.07
    sources:
      - {id: "meta-math/MetaMathQA",                              type: hf, share: 0.02625, split: train}
      - {id: "microsoft/orca-math-word-problems-200k",            type: hf, share: 0.02625, split: train}
      - {id: "TIGER-Lab/MathInstruct",                            type: hf, share: 0.01750, split: train}

  # ---------- C. TOOL CALLING — 6% = 4.8M tokens ----------
  tools:
    share: 0.06
    sources:
      - {id: "NousResearch/hermes-function-calling-v1",           type: hf, share: 0.02570, split: train}
      - {id: "Salesforce/xlam-function-calling-60k",              type: hf, share: 0.01710, split: train}
      - {id: "glaiveai/glaive-function-calling-v2",               type: hf, share: 0.01710, split: train}

  # ---------- D. DOMAIN SPECIALTY — 32% = 25.6M tokens ----------
  domain:
    share: 0.32

    indian_law:
      share: 0.010
      sources:
        - {id: "india_code_acts",                  type: scrape, url_seed: "https://www.indiacode.nic.in/", focus: "BNS,BNSS,BSA"}
        - {id: "indian_kanoon",                    type: scrape, url_seed: "https://api.indiankanoon.org/search/", focus: "supreme_court,high_court_2020+"}

    indian_taxation:
      share: 0.010
      sources:
        - {id: "cbdt_circulars",                   type: scrape, url_seed: "https://www.incometaxindia.gov.in/Pages/communications/circulars.aspx"}
        - {id: "cbic_gst",                         type: scrape, url_seed: "https://cbic-gst.gov.in/cgst-act.html"}
        - {id: "synthetic_qa_taxation",            type: synthetic, teacher: "deepseek-v3", base_corpus: "above"}

    pharmacology:
      share: 0.010
      sources:
        - {id: "drugbank_open",                    type: api, endpoint: "https://go.drugbank.com/releases/latest"}
        - {id: "openfda_labels",                   type: api, endpoint: "https://api.fda.gov/drug/label.json"}
        - {id: "ncbi_pmc_oa_pharmacology",         type: api, endpoint: "https://www.ncbi.nlm.nih.gov/pmc/tools/openftlist/", filter: "pharmacology"}

    quantitative_finance:
      share: 0.015
      sources:
